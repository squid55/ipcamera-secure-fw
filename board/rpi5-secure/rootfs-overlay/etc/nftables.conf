#!/usr/sbin/nft -f
# 네트워크 하드닝: default-deny (3.3.1 관리 IP 제한 · 10.3.1 · 미기재 경로 차단)
flush ruleset

table inet filter {
	set mgmt_allow {           # SFR:3.3.1 관리 접속 허용 IP allowlist (프로비저닝이 채움)
		type ipv4_addr
		flags interval
	}

	chain input {
		type filter hook input priority 0; policy drop;   # default-deny
		ct state established,related accept
		iif "lo" accept
		# 관리 접속(HTTPS/SSH)은 allowlist 에서만
		ip saddr @mgmt_allow tcp dport { 443, 22 } accept  # SFR:4.1.1
		# 영상 스트리밍(RTSPS, mediamtx 8322) — 정책에 따라 소스 제한
		tcp dport 8322 accept                               # SFR:1.2.1 RTSPS
		# 평문 HTTP(80)·telnet(23) 없음
	}
	chain forward { type filter hook forward priority 0; policy drop; }
	chain output  { type filter hook output priority 0; policy accept; }
}
