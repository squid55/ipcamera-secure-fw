# ipcam 웹 관리 UI — HTTPS 전용
# SFR:4.1.1 관리접속 TLS  SFR:2.1.1 인증  SFR:2.5.1 정보노출 최소화  SFR:1.2.1 TLS1.2+
# [하드닝 TODO] 현재 root 실행(부팅 시 600 인증서/암호 읽기용). 양산은 권한강등(server.username) 권장.

server.modules = (
  "mod_openssl",
  "mod_auth",
  "mod_authn_file",
  "mod_setenv",
)

server.document-root = "/var/www"
server.port          = 443
server.bind          = "0.0.0.0"
server.errorlog      = "/var/log/lighttpd-error.log"
server.pid-file      = "/run/lighttpd.pid"
index-file.names     = ( "index.html" )

mimetype.assign = (
  ".html" => "text/html; charset=utf-8",
  ".css"  => "text/css",
  ".js"   => "application/javascript",
  ".svg"  => "image/svg+xml",
  ".png"  => "image/png",
  ".ico"  => "image/x-icon",
)

# --- TLS (SFR:1.2.1/4.1.1): 프로비저닝 발급 기기 인증서, TLS1.2+ ---
ssl.engine  = "enable"
ssl.pemfile = "/data/tls/server.crt"
ssl.privkey = "/data/tls/server.key"
ssl.openssl.ssl-conf-cmd = ("MinProtocol" => "TLSv1.2")

# --- 인증 (SFR:2.1.1): HTTPS 위 Basic, 관리 암호(프로비저닝 생성 /data/web/passwd) ---
auth.backend = "htpasswd"
auth.backend.htpasswd.userfile = "/data/web/passwd"
auth.require = ( "/" => (
  "method"  => "basic",
  "realm"   => "ipcam management",
  "require" => "valid-user",
) )

# --- 보안 응답 헤더 (SFR:2.5.1) ---
setenv.add-response-header = (
  "X-Frame-Options"           => "SAMEORIGIN",
  "X-Content-Type-Options"    => "nosniff",
  "Referrer-Policy"           => "no-referrer",
  "Strict-Transport-Security" => "max-age=31536000",
)
