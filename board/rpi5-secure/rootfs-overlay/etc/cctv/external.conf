# 외부 IT실체(VMS·NTP·로그서버) 연동 설정
# SFR:2.1.2 외부 IT실체 인증   SFR:2.3.2 / SFR:3.4.4 외부 IT실체 인증정보 설정
# SFR:4.1.2 외부 IT실체 연동 전송 보호(암호통신)

# 모든 외부 연동은 상호 TLS(mTLS)로 인증·암호화한다. 자격증명은 프로비저닝 시 주입.
[tls]
ca_cert   = /etc/ssl/cctv/ca.crt        # 외부 실체 검증용 신뢰 CA
client_cert = /etc/ssl/cctv/client.crt  # 본 기기 클라이언트 인증서
client_key  = /etc/ssl/cctv/client.key  # (프로비저닝 주입, 미커밋)
verify    = required                      # 인증서 검증 필수(익명 연동 금지)

[vms]
enabled   = false                         # 최초 default 상태에서 관리자가 설정(SFR:2.3.2)
endpoint  =
auth      = mtls

[log_server]                              # 감사기록 외부 백업(syslog over TLS)
enabled   = false
endpoint  =
auth      = mtls

[ntp]                                     # SFR:8.1.3 신뢰 시간(감사 타임스탬프) — 인증 NTP
server    =
authenticated = true
