# RAUC A/B 시스템 설정
# SFR:6.1.1 업데이트 파일 유효성 검증(서명)   SFR:6.1.3 실패시 기존버전 유지(A/B 롤백)

[system]
compatible=ipcamera-secure-rpi5
bootloader=uboot
# U-Boot bootcount + BOOT_ORDER 로 부팅 실패 시 이전 슬롯으로 자동 롤백(SFR:6.1.3)
boot-attempts=3

[keyring]
# 서명 번들 검증용 공개 인증서(빌드/프로비저닝 시 주입). 아래 README 참조.
path=/etc/rauc/keyring.pem

# A/B 루트 슬롯 (genimage: p2=A, p3=B)
[slot.rootfs.0]
device=/dev/mmcblk0p2
type=raw
bootname=A

[slot.rootfs.1]
device=/dev/mmcblk0p3
type=raw
bootname=B
