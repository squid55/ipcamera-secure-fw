# A/B 이중화 파티션 이미지 (6.1.3 롤백 · 5.2.1 무결성)
# boot(FAT) + rootfs A/B(squashfs+verity, RO) + config/data(암호화)
image boot.vfat {
	vfat { files = { "bcm2712-rpi-5-b.dtb", "config.txt", "cmdline.txt", "kernel8.img", "u-boot.bin" } }
	size = 64M
}

image sdcard.img {
	hdimage {}

	partition boot {
		partition-type = 0xC
		bootable = "true"
		image = "boot.vfat"
	}
	partition rootfs_a {
		partition-type = 0x83
		image = "rootfs.squashfs"       # dm-verity 해시는 post-image에서 부착
	}
	partition rootfs_b {
		partition-type = 0x83
		image = "rootfs.squashfs"       # A/B 동일 초기 이미지
	}
	partition config {
		partition-type = 0x83
		size = 64M                       # LUKS 암호화(4.2.x) — 최초 부팅시 포맷
	}
	partition data {
		partition-type = 0x83
		size = 512M                      # 암호화 로그/상태(8.3.2)
	}
}
