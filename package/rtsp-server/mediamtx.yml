# mediamtx 하드닝 설정 — 범용 IP카메라 스트리밍 (Phase A)
# SFR:1.1.1 사용자 인증(익명 차단)  SFR:1.2.1 암호전송(TLS)
# 멀티스트림(main/sub) + RTSPS + WebRTC + HLS. 인증서는 프로비저닝(S20)이 /data/tls 에 발급.

logLevel: info
logDestinations: [stdout]

# --- RTSP/RTSPS (SFR:1.2.1) ---
#   외부 시청=RTSPS(8322, TLS). 내부 발행=평문 loopback(127.0.0.1:8554)만 → 외부 노출 0.
#   (자체서명 RTSPS 루프백 발행은 gstreamer에서 불안정 → 내부는 평문 loopback으로 분리)
rtsp: yes
encryption: "optional"                     # plain(loopback) + RTSPS(외부) 동시
rtspAddress: 127.0.0.1:8554                # 평문 RTSP는 loopback 전용(외부 불가)
rtspsAddress: :8322                         # RTSPS는 전 인터페이스(외부 시청)
protocols: [tcp]
serverCert: /data/tls/server.crt
serverKey:  /data/tls/server.key

# --- WebRTC (PC/폰 브라우저 시청) 포트 8889, TLS ---
webrtc: yes
webrtcAddress: :8889
webrtcEncryption: yes
webrtcServerCert: /data/tls/server.crt
webrtcServerKey:  /data/tls/server.key
webrtcLocalUDPAddress: :8189
webrtcIPsFromInterfaces: yes

# --- HLS (범용 호환 뷰) 포트 8888, TLS, 저지연 ---
hls: yes
hlsAddress: :8888
hlsEncryption: yes
hlsServerCert: /data/tls/server.crt
hlsServerKey:  /data/tls/server.key
hlsVariant: lowLatency

rtmp: no
srt: no

# --- 사용자 인증 (SFR:1.1.1) — 익명 없음. viewer는 모든 스트림 read ---
authMethod: internal
authInternalUsers:
  - user: viewer
    pass: __VIEWER_PW__                    # S65가 stream.env로 주입
    ips: []
    permissions:
      - action: read
  - user: publisher
    pass: __PUBLISHER_PW__
    permissions:
      - action: publish

# --- 스트림 경로 (runOnInit=단일라인 인용문자열: YAML 폴딩 모호성 제거) ---
paths:
  # [메인+서브] IMX219 → 단일 캡처 → tee → main(1080p) + sub(640x480). PiSP 동작 시 활성.
  cam:
    runOnInit: 'gst-launch-1.0 libcamerasrc ! video/x-raw,width=1920,height=1080,framerate=30/1 ! tee name=t t. ! queue ! videoconvert ! x264enc speed-preset=ultrafast tune=zerolatency bitrate=4000 ! h264parse ! rtspclientsink protocols=tcp location=rtsp://publisher:__PUBLISHER_PW__@127.0.0.1:8554/cam t. ! queue ! videoscale ! video/x-raw,width=640,height=480 ! videoconvert ! x264enc speed-preset=ultrafast tune=zerolatency bitrate=800 ! h264parse ! rtspclientsink protocols=tcp location=rtsp://publisher:__PUBLISHER_PW__@127.0.0.1:8554/cam_sub'
    runOnInitRestart: yes
  cam_sub:

  # [테스트 패턴] 카메라(PiSP) 없이 스트리밍 스택 실증용. videotestsrc=gst-base 기본.
  test:
    runOnInit: 'gst-launch-1.0 videotestsrc is-live=true ! video/x-raw,width=1280,height=720,framerate=25/1 ! videoconvert ! x264enc speed-preset=ultrafast tune=zerolatency bitrate=2000 ! h264parse ! rtspclientsink protocols=tcp location=rtsp://publisher:__PUBLISHER_PW__@127.0.0.1:8554/test'
    runOnInitRestart: yes
