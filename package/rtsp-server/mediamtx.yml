# mediamtx 하드닝 설정 — IP카메라 영상 스트리밍
# SFR:1.1.1 사용자 인증(익명 접근 차단)   SFR:1.2.1 RTSPS 암호전송

logLevel: info
logDestinations: [stdout]

# --- RTSPS 암호전송 (SFR:1.2.1) — mediamtx v1.9.3 키 스키마 ---
rtsp: yes
encryption: "strict"            # 평문 RTSP 거부, TLS(RTSPS)만 허용 (RTSPS 포트 8322)
protocols: [tcp]                # UDP/멀티캐스트 비활성(전송 보호)
serverCert: /data/tls/server.crt           # 프로비저닝(S20)이 기기별 발급(쓰기가능 파티션)
serverKey:  /data/tls/server.key
rtmp: no
hls: no
webrtc: no
srt: no

# --- 사용자 인증 (SFR:1.1.1) — 익명(any) 없음 ---
authMethod: internal
authInternalUsers:
  - user: viewer
    # 비밀번호는 프로비저닝(S20) 시 주입 — S65 가 stream.env 로 치환. 기본값 없음.
    pass: __VIEWER_PW__
    ips: []
    permissions:
      - action: read
  - user: publisher
    pass: __PUBLISHER_PW__
    permissions:
      - action: publish

# --- 카메라 소스 (IMX219 → libcamera → 소프트 H.264) ---
paths:
  cam:
    # RPi5는 HW 인코더 없음 → x264enc(소프트). 2GB 고려 1080p.
    runOnInit: >
      gst-launch-1.0 libcamerasrc !
      video/x-raw,width=1920,height=1080,framerate=30/1 !
      videoconvert ! x264enc speed-preset=ultrafast tune=zerolatency bitrate=4000 !
      rtspclientsink location=rtsps://localhost:8322/cam
    runOnInitRestart: yes
